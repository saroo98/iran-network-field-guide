name: redaction-check

on:
  pull_request:
  push:

jobs:
  redaction-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run redaction scan
        run: python tools/redaction_scan.py .
      - name: Compile tools
        run: python -m py_compile tools/*.py
